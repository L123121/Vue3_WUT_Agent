# ======================================================================
# nginx 配置 — 武理小精灵 生产部署
# 功能: SSL 终止 + 反向代理 /api → backend + 静态资源缓存 + gzip
# ======================================================================
#
# 首次部署前:
#   1. 将 your-domain.com 替换为你的真实域名
#   2. 用 certbot 获取 SSL 证书:
#      docker run --rm -v ssl-certs:/etc/letsencrypt certbot/certbot \
#        certonly --webroot -w /tmp -d your-domain.com
#   3. 或者使用阿里云免费 SSL 证书，挂载到 /etc/letsencrypt/live/your-domain.com/
# ======================================================================

upstream backend {
    server backend:3000;
    keepalive 64;
}

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let's Encrypt 验证 (certbot)
    location /.well-known/acme-challenge/ {
        root /tmp/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 服务 ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # ===== SSL 配置 =====
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== 安全头 =====
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2
        font/woff;

    # ===== 日志 =====
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ===== API 代理（所有 /api 请求转发到后端） =====
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (流式响应) 特殊配置
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        # 请求体限制（后端也有限制，这里再加一层）
        client_max_body_size 25m;
    }

    # ===== 上传文件 =====
    location /uploads {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 图片等静态资源可缓存
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== 前端 SPA =====
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA 资源缓存策略
        # Vite 构建产物带 hash，可长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML (入口文件) 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store";
        }
    }
}
